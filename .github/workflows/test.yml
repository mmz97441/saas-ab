name: CI

on:
  workflow_call:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-abconsultants-main/ab-consultant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-abconsultants-main/ab-consultant/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test

  rules-tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-abconsultants-main/ab-consultant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-abconsultants-main/ab-consultant/package-lock.json
      # firebase-tools >= recent versions require JDK 21+ to run the Firestore emulator.
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: npm ci --legacy-peer-deps
      - run: npm install -g firebase-tools
      - run: npm run test:rules

  functions-tests:
    name: Cloud functions tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-abconsultants-main/ab-consultant/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-abconsultants-main/ab-consultant/functions/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  type-check:
    name: TypeScript build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-abconsultants-main/ab-consultant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-abconsultants-main/ab-consultant/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
